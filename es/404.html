<!DOCTYPE html>
<html lang="es">

<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada | NeuroSinc</title>

    <link rel="alternate" hreflang="en" href="https://neurosinc.com/404.html" />
    <link rel="alternate" hreflang="es" href="https://neurosinc.com/es/404.html" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/styles.css?v=1.2">
    <link rel="icon" type="image/png" href="/assets/img/logo-icon.png">

    <style>
        .error-hero {
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 80px;
            position: relative;
            background-color: var(--bg-color);
            background-image: url('/assets/img/hero-bg.png');
            background-size: cover;
            background-position: center bottom;
        }

        .error-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(11, 11, 11, 0.6) 0%, rgba(11, 11, 11, 0.95) 100%);
        }

        .error-hero-inner {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .error-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
        }

        .error-title {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 1.5rem;
            color: #fff;
        }

        .error-desc {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div id="site-header"></div>

    <section class="error-hero">
        <div class="error-hero-inner fade-in-up visible">
            <div class="error-code text-gradient">404</div>
            <h1 class="error-title">Página no encontrada</h1>
            <p class="error-desc">La página que buscas no existe o ha sido movida. Volvamos al inicio para que puedas
                encontrar tu equilibrio.</p>
            <a href="/es/" class="btn btn-primary" style="padding: 1rem 3rem;">Volver al Inicio</a>
        </div>
    </section>

    <div id="site-footer"></div>
    <script src="/js/layout.js"></script>
    <script src="/js/script.js"></script>
</body>

</html>
